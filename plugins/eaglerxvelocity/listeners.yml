listener_01:
  address: 0.0.0.0:5000
  address_v6: 'null'
  max_players: 10000
  forward_ip: false
  forward_ip_header: X-Real-IP
  redirect_legacy_clients_to: 'null'
  server_icon: ClearCraft.png
  server_motd:
  - '§9§m§l»---§3§m§l--§b§m§l--§f§m§l--§7§l[ §5§lVe§5§ll§f§lda§d§lr§5§lia §cNETWORK §7§l]§f§m§l--§b§m§l--§3§m§l--§9§m§l---«§r'
  - '§fsurvival §a§l!UPDATE! ClearSMP to VeldariaSMP   §r§7[Region:Europe]'
  allow_motd: true
  allow_query: true
  min_minecraft_protocol: 47
  max_minecraft_protocol: 340
  allow_protocol_v3: true
  allow_protocol_v4: true
  protocol_v4_defrag_send_delay: 10
  use_haproxy_protocol: false
  allow_cookie_revoke_query: true
  request_motd_cache:
    cache_ttl: 7200
    online_server_list_animation: false
    online_server_list_results: true
    online_server_list_trending: true
    online_server_list_portfolios: false
  http_server:
    enabled: false
    root: 'web'
    page_404_not_found: 'default'
    page_index_name:
    - 'index.html'
    - 'index.htm'
  allow_voice: false
  ratelimit:
    ip:
      enable: true
      period: 90
      limit: 60
      limit_lockout: 80
      lockout_duration: 1200
      exceptions:
      - '127.*'
      - '0:0:0:0:0:0:0:1'
    login:
      enable: true
      period: 50
      limit: 5
      limit_lockout: 10
      lockout_duration: 300
      exceptions:
      - '127.*'
      - '0:0:0:0:0:0:0:1'
    motd:
      enable: true
      period: 30
      limit: 5
      limit_lockout: 15
      lockout_duration: 300
      exceptions:
      - '127.*'
      - '0:0:0:0:0:0:0:1'
    query:
      enable: true
      period: 30
      limit: 15
      limit_lockout: 25
      lockout_duration: 900
      exceptions:
      - '127.*'
      - '0:0:0:0:0:0:0:1'
